<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iframe chat widget</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="chat-shell">
      <main class="chat-main">
        <section class="message-panel">
          <div id="status-banner" class="status-banner hidden"></div>
          <div class="message-panel-tools">
            <div class="message-panel-actions">
              <input
                id="attachment-input"
                type="file"
                accept="image/png,image/jpeg,image/gif,image/webp,image/bmp"
                hidden
                disabled
              />
              <button id="attachment-button" type="button" disabled>
                이미지 첨부
              </button>
            </div>
            <div class="message-scroll-controls" aria-label="채팅 스크롤 버튼">
              <button
                id="scroll-up-button"
                type="button"
                aria-label="위로 스크롤"
              >
                ▲
              </button>
              <button
                id="scroll-down-button"
                type="button"
                aria-label="아래로 스크롤"
              >
                ▼
              </button>
            </div>
          </div>
          <div id="message-list" class="message-list"></div>
        </section>

        <aside class="sidebar">
          <div class="card participants-card">
            <div class="participants-title-row">
              <h2>참여자</h2>
              <span id="participants-mini-count">0</span>
            </div>
            <div id="user-list" class="user-list"></div>
            <p id="empty-users" class="empty-copy">없음</p>
          </div>
        </aside>
      </main>

      <footer class="composer-panel">
        <form id="chat-form" class="composer-form">
          <div class="composer-input-wrap">
            <input
              id="message-input"
              type="text"
              maxlength="300"
              placeholder="메시지를 입력하세요"
              autocomplete="off"
              disabled
            />
          </div>
          <div class="composer-actions">
            <button id="send-button" type="submit" disabled>전송</button>
          </div>
        </form>
      </footer>
    </div>

    <div id="nickname-modal" class="nickname-modal hidden">
      <form id="nickname-form" class="nickname-dialog">
        <h2>닉네임 입력</h2>
        <input
          id="nickname-input"
          type="text"
          maxlength="20"
          placeholder="닉네임"
          autocomplete="off"
        />
        <button id="nickname-button" type="submit">입장</button>
      </form>
    </div>

    <div id="nickname-action-menu" class="nickname-action-menu hidden">
      <button id="nickname-whisper-button" type="button">귓속말하기</button>
      <button id="nickname-call-button" type="button">호출하기</button>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
